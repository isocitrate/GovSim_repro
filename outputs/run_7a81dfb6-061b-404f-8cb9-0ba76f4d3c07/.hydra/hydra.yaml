hydra:
  run:
    dir: ./outputs/${uuid:}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: RUN
  searchpath:
  - ./simulation/scenarios/fishing/conf
  - ./simulation/scenarios/sheep/conf
  - ./simulation/scenarios/pollution/conf
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=RUN
    task:
    - experiment=sheep_free_communication
    - llm.path=Qwen/Qwen2.5-7B-Instruct
    - llm.backend=transformers
    - llm.is_api=false
    - seed=10000
    - group_name=sheep/free_communication/qwen2_5_7b_1round_c1
    - output_run_name=trial_0_seed_10000
    - experiment.env.max_num_rounds=1
    - experiment.agent.converse.max_conversation_steps=1
    - debug=true
  job:
    name: main
    chdir: null
    override_dirname: debug=true,experiment.agent.converse.max_conversation_steps=1,experiment.env.max_num_rounds=1,experiment=sheep_free_communication,group_name=sheep/free_communication/qwen2_5_7b_1round_c1,llm.backend=transformers,llm.is_api=false,llm.path=Qwen/Qwen2.5-7B-Instruct,output_run_name=trial_0_seed_10000,seed=10000
    id: ???
    num: ???
    config_name: config
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /home/justinchen/GovSim_repro
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /home/justinchen/GovSim_repro/simulation/conf
      schema: file
      provider: main
    - path: ./simulation/scenarios/fishing/conf
      schema: file
      provider: hydra.searchpath in main
    - path: ./simulation/scenarios/sheep/conf
      schema: file
      provider: hydra.searchpath in main
    - path: ./simulation/scenarios/pollution/conf
      schema: file
      provider: hydra.searchpath in main
    - path: ''
      schema: structured
      provider: schema
    output_dir: /home/justinchen/GovSim_repro/outputs/run_7a81dfb6-061b-404f-8cb9-0ba76f4d3c07
    choices:
      experiment: sheep_free_communication
      experiment/persona@experiment.personas.persona_4: baseline_shepherd
      experiment/persona@experiment.personas.persona_3: baseline_shepherd
      experiment/persona@experiment.personas.persona_2: baseline_shepherd
      experiment/persona@experiment.personas.persona_1: baseline_shepherd
      experiment/persona@experiment.personas.persona_0: baseline_shepherd
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
